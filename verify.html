        :root {

        .card { background: var(--surface-color); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 24px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0, 255, 204, 0.04); }

        /* Lock icon animation */

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* OTP Input Boxes */
        .otp-container { display: flex; gap: 0.75rem; justify-content: center; margin: 2rem 0; }

            width: 48px; height: 62px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #000000;
            font-size: 1.6rem;

            text-align: center;
            caret-color: var(--secondary);

        }
        .otp-input:focus {
            outline: none;
            border-color: #00FFCC;
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.15);
        }
        .otp-input.filled {
            border-color: #00FFCC;

        .otp-input.error-shake {
            animation: shake 0.4s ease;
            border-color: #EF4444 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15) !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }

        .btn { padding: 1.1rem 2rem; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-decoration: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; width: 100%; display: block; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Modern Liquid Motion Button */
        @keyframes liquid-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-primary { background: linear-gradient(135deg, #D4FF33, #00FFCC, #D4FF33); background-size: 200% auto; animation: liquid-gradient 3s linear infinite; color: #000000; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(212, 255, 51, 0.35); position: relative; }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(212, 255, 51, 0.55); }
        .btn-primary:active { transform: translateY(-1px) scale(0.99); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .error-msg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; text-align: center; border-radius: 12px; }
        .success-msg { background: rgba(0,255,204,0.08); border: 1px solid rgba(0,255,204,0.2); color: #00e6b8; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; text-align: center; border-radius: 12px; }

        .resend-section { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500; }
        .resend-btn { background: none; border: none; color: #FF6B4A; cursor: pointer; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; text-decoration: underline; transition: color 0.2s; }

        .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500; }

        /* Progress dots */
        .progress { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
        .progress-dot { width: 10px; height: 10px; background: var(--border); border-radius: 0; transition: all 0.3s; }
        .progress-dot.done { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .progress-dot.active { background: var(--secondary); box-shadow: 0 0 10px var(--secondary); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes rover-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        <div class="progress">

            <div class="otp-container" id="otp-container">
                <input type="text" maxlength="1" class="otp-input" data-index="0" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" maxlength="1" class="otp-input" data-index="1" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" data-index="2" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" data-index="3" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" data-index="4" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" data-index="5" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" data-index="6" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" data-index="7" inputmode="numeric">
            </div>

            <button class="btn btn-primary" id="verify-btn" onclick="verifyOtp()">Verify & Continue &rarr;</button>

            <div class="resend-section">
                <p>Didn't get the code? <button class="resend-btn" id="resend-btn" onclick="resendCode()" disabled>Resend Code</button></p>
                <p class="timer" id="timer-text"></p>
            </div>

            <div class="back-link">
                <a href="signup.html">&larr; Back to Sign Up</a>
            </div>
        </div>

        <div class="card" id="new-password-card" style="display:none;">
            <div class="error-msg" id="pw-error-msg"></div>
            <div class="success-msg" id="pw-success-msg"></div>
            <p style="margin-bottom: 1.25rem; color: #52525B; font-size: 0.95rem;">Set a new password for your account.</p>
            <div style="margin-bottom: 1rem; text-align: left;">
                <label style="display:block; font-size:0.8rem; font-weight:700; color:#52525B; margin-bottom:0.35rem;">NEW PASSWORD</label>
                <input type="password" id="new-password" placeholder="At least 8 characters" style="width:100%; padding:0.85rem 1rem; border:1px solid var(--border); border-radius:12px; font-size:1rem;">
            </div>
            <div style="margin-bottom: 1.25rem; text-align: left;">
                <label style="display:block; font-size:0.8rem; font-weight:700; color:#52525B; margin-bottom:0.35rem;">CONFIRM NEW PASSWORD</label>
                <input type="password" id="confirm-password" placeholder="Re-enter password" style="width:100%; padding:0.85rem 1rem; border:1px solid var(--border); border-radius:12px; font-size:1rem;">
            </div>
            <button class="btn btn-primary" id="set-password-btn" onclick="setNewPassword()">Set Password &rarr;</button>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ahpvdcdpwtdeoiatjvnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFocHZkY2Rwd3RkZW9pYXRqdm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzkzOTgsImV4cCI6MjA5MjM1NTM5OH0.CtrIL_U2y4Ffu8BBENNzloAkWBkvcq3WAhEeROH1LC0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Retrieve email from sessionStorage (set during signup, or during forgot-password login)
        const pendingEmail = sessionStorage.getItem('pending_verification_email');
        // 'signup' (default) = new account confirmation; 'login' = forgot-password / returning-user OTP
        const otpFlow = sessionStorage.getItem('otp_flow') || 'signup';
        if (!pendingEmail) {
            // No email to verify, redirect back to signup
            window.location.href = 'signup.html';
        }
        document.getElementById('user-email').textContent = pendingEmail || '';

        // ─── OTP Input Logic ───
        const inputs = document.querySelectorAll('.otp-input');

        inputs.forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                // Only allow digits
                if (!/^\d$/.test(val)) {
                    e.target.value = '';
                    return;
                }
                e.target.classList.add('filled');
                // Auto-focus next
                if (idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                }
                // Auto-submit when all 6 filled
                if (getOtpValue().length === 8) {
                    verifyOtp();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace') {
                    if (input.value === '' && idx > 0) {
                        inputs[idx - 1].focus();
                        inputs[idx - 1].value = '';
                        inputs[idx - 1].classList.remove('filled');
                    } else {
                        input.value = '';
                        input.classList.remove('filled');
                    }
                }
            });

            // Handle paste of full code
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 8);
                if (pasted.length === 8) {
                    pasted.split('').forEach((ch, i) => {
                        inputs[i].value = ch;
                        inputs[i].classList.add('filled');
                    });
                    inputs[7].focus();
                    verifyOtp();
                }
            });

            input.addEventListener('focus', () => {
                input.select();
            });
        });

        function getOtpValue() {
            return Array.from(inputs).map(i => i.value).join('');
        }

        // ─── Verify OTP ───
        async function verifyOtp() {
            const token = getOtpValue();
            if (token.length !== 8) {
                showError('Please enter the full 8-digit code.');
                shakeInputs();
                return;
            }

            const btn = document.getElementById('verify-btn');
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const { data, error } = await supabaseClient.auth.verifyOtp({
                    email: pendingEmail,
                    token: token,
                    type: otpFlow === 'login' ? 'recovery' : 'signup'
                });

                if (error) throw error;

                // PostHog: identify the now-verified account + funnel step
                if (window.posthog && data.user) {
                    posthog.identify(data.user.id, { email: pendingEmail });
                    posthog.capture(otpFlow === 'login' ? 'otp_login' : 'email_verified');
                }

                sessionStorage.removeItem('pending_verification_email');
                sessionStorage.removeItem('otp_flow');

                if (otpFlow === 'login') {
                    // Returning user regaining access — let them set a password they'll
                    // actually remember before sending them into the dashboard, rather than
                    // just logging them in on the one-time code with nothing changed.
                    document.getElementById('otp-container').style.display = 'none';
                    btn.style.display = 'none';
                    document.querySelector('.resend-section').style.display = 'none';
                    document.querySelector('.back-link').style.display = 'none';
                    successMsg.style.display = 'none';
                    document.getElementById('new-password-card').style.display = 'block';
                } else {
                    // Success
                    successMsg.textContent = '✅ Email verified! Setting up your account...';
                    successMsg.style.display = 'block';

                    // Update progress dots
                    document.querySelectorAll('.progress-dot').forEach(d => { d.classList.add('done'); d.classList.remove('active'); });

                    // Pre-populate profiles table with signup email and names
                    const user = data.user;
                    const fullName = user.user_metadata?.full_name || '';
                    const parts = fullName.split(' ');
                    const firstName = parts[0] || '';
                    const lastName = parts.slice(1).join(' ') || '';

                    await supabaseClient
                        .from('profiles')
                        .update({
                            email: pendingEmail,
                            first_name: firstName,
                            last_name: lastName
                        })
                        .eq('id', user.id);

                    setTimeout(() => {
                        window.location.href = 'onboarding.html';
                    }, 1500);
                }

            } catch (err) {
                showError(err.message || 'Invalid code. Please try again.');
                shakeInputs();
                btn.disabled = false;
                btn.textContent = 'Verify & Continue →';
            }
        }

        // ─── Set New Password (forgot-password flow only) ───
        async function setNewPassword() {
            const pwErrorMsg = document.getElementById('pw-error-msg');
            const pwSuccessMsg = document.getElementById('pw-success-msg');
            pwErrorMsg.style.display = 'none';
            pwSuccessMsg.style.display = 'none';

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword.length < 8) {
                pwErrorMsg.textContent = 'Password must be at least 8 characters.';
                pwErrorMsg.style.display = 'block';
                return;
            }
            if (newPassword !== confirmPassword) {
                pwErrorMsg.textContent = 'Passwords do not match.';
                pwErrorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('set-password-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

            if (error) {
                pwErrorMsg.textContent = error.message || 'Could not set password. Please try again.';
                pwErrorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Set Password →';
                return;
            }

            pwSuccessMsg.textContent = '✅ Password set! Redirecting to your dashboard...';
            pwSuccessMsg.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function shakeInputs() {
            inputs.forEach(i => {
                i.classList.add('error-shake');
                setTimeout(() => i.classList.remove('error-shake'), 500);
            });
        }

        // ─── Resend Code ───
        let resendCooldown = 60;
        let resendTimer = null;

        function startResendTimer() {
            const timerText = document.getElementById('timer-text');
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;
            resendCooldown = 60;

            resendTimer = setInterval(() => {
                resendCooldown--;
                timerText.textContent = `Resend available in ${resendCooldown}s`;
                if (resendCooldown <= 0) {
                    clearInterval(resendTimer);
                    timerText.textContent = '';
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        async function resendCode() {
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;

            try {
                const { error } = otpFlow === 'login'
                    ? await supabaseClient.auth.resetPasswordForEmail(pendingEmail, {})
                    : await supabaseClient.auth.resend({
                        type: 'signup',
                        email: pendingEmail
                    });

                if (error) throw error;

                const successMsg = document.getElementById('success-msg');
                successMsg.textContent = '📧 New code sent! Check your inbox.';
                successMsg.style.display = 'block';
                setTimeout(() => { successMsg.style.display = 'none'; }, 4000);

                startResendTimer();
            } catch (err) {
                showError(err.message || 'Failed to resend code. Try again later.');
                resendBtn.disabled = false;
            }
        }

        // Start initial timer
        startResendTimer();

        // Auto-focus first input
        inputs[0].focus();
    </script>
</body>
</html>
