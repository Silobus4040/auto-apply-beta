<!DOCTYPE html>
<html lang="en">
<head>
    <script>if (window.location.hostname === 'jobs.leadscompass.ai') window.location.replace('https://myrolerover.com' + window.location.pathname + window.location.search);</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --surface-color: #ffffff;
            --primary: #00FFCC;
            --primary-hover: #00e6b8;
            --secondary: #FF6B4A;
            --text-heading: #000000;
            --text-body: #27272A;
            --border: #e4e4e7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-body); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }

        /* Soft background glows */
        body::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(212,255,51,0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -10%; right: -10%;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(0,255,204,0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid rgba(0,0,0,0.06); width: 100%; }
        .logo { color: var(--text-heading); font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; text-decoration: none; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; }
        .logo span { background: linear-gradient(135deg, #D4FF33, #00FFCC); color: #000000; padding: 0.2rem 0.6rem; margin-left: 0.35rem; font-size: 1.1rem; font-weight: 800; border-radius: 8px; display: inline-block; vertical-align: middle; box-shadow: 0 4px 10px rgba(212, 255, 51, 0.15); }

        .container { max-width: 500px; margin: 4rem auto; padding: 0 5%; flex: 1; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { color: var(--text-heading); font-size: 2.2rem; font-weight: 900; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: -1px; }
        .header p { color: #52525B; font-size: 1rem; font-weight: 500; }

        .card { background: var(--surface-color); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 24px; padding: 3rem 2.5rem; box-shadow: 0 20px 40px rgba(0, 255, 204, 0.04); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #52525B; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 1rem; background: #ffffff; border: 1px solid var(--border); border-radius: 12px; color: #000000; font-size: 1rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.15); }
        .password-hint { font-size: 0.8rem; color: #6B7280; margin-top: 0.4rem; }

        .btn { padding: 1.1rem 2rem; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-decoration: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; width: 100%; display: block; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Modern Liquid Motion Button */
        @keyframes liquid-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-primary { background: linear-gradient(135deg, #D4FF33, #00FFCC, #D4FF33); background-size: 200% auto; animation: liquid-gradient 3s linear infinite; color: #000000; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(212, 255, 51, 0.35); position: relative; }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(212, 255, 51, 0.55); }
        .btn-primary:active { transform: translateY(-1px) scale(0.99); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.95rem; font-weight: 500; }
        .login-link a { color: #FF6B4A; text-decoration: none; font-weight: 700; text-transform: uppercase; }
        .login-link a:hover { text-decoration: underline; }

        .error-msg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; border-radius: 12px; }
        .success-msg { background: rgba(0,255,204,0.08); border: 1px solid rgba(0,255,204,0.2); color: #00e6b8; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; border-radius: 12px; }
        @keyframes rover-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">ROLES <span style="display:inline-block; animation: rover-spin 4s linear infinite; margin: 0 4px;">🧭</span> <span>ROVER</span></a></nav>

    <div class="container">
        <div class="header">
            <h1>Create Your Account</h1>
            <p>Set up your profile and start automating your job hunt.</p>
        </div>

        <div class="card">
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="signup-password" required placeholder="Minimum 8 characters" minlength="8">
                    <p class="password-hint">Must be at least 8 characters long</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm your password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" id="signup-btn">Create Account &rarr;</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ahpvdcdpwtdeoiatjvnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFocHZkY2Rwd3RkZW9pYXRqdm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzkzOTgsImV4cCI6MjA5MjM1NTM5OH0.CtrIL_U2y4Ffu8BBENNzloAkWBkvcq3WAhEeROH1LC0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });

                if (error) throw error;

                // Store email for OTP verification page
                sessionStorage.setItem('pending_verification_email', email);

                successMsg.textContent = '✅ Account created! Check your email for a 6-digit verification code.';
                successMsg.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'verify.html';
                }, 1500);

            } catch (err) {
                errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        });
    </script>
</body>
</html>
