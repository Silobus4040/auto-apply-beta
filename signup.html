<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #121212;
            --primary: #D4FF33;
            --primary-hover: #bde62b;
            --secondary: #FF6B4A;
            --text-heading: #FFFFFF;
            --text-body: #A1A1AA;
            --border: #27272A;
            --brutal-shadow: 4px 4px 0px #D4FF33;
            --brutal-shadow-hover: 6px 6px 0px #FF6B4A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-body); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.3;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid var(--border); width: 100%; }
        .logo { color: var(--text-heading); font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        .container { max-width: 500px; margin: 4rem auto; padding: 0 5%; flex: 1; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { color: var(--text-heading); font-size: 2.2rem; font-weight: 900; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: -1px; }
        .header p { color: var(--text-body); font-size: 1rem; }

        .card { background: var(--surface-color); border: 2px solid var(--border); padding: 2.5rem; box-shadow: 8px 8px 0px rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #E5E7EB; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; }
        input { width: 100%; padding: 1rem; background: #000; border: 2px solid var(--border); border-radius: 0; color: white; font-size: 1rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 4px 4px 0px var(--primary); }
        .password-hint { font-size: 0.8rem; color: #6B7280; margin-top: 0.4rem; }

        .btn { padding: 1.2rem 2rem; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-decoration: none; transition: all 0.2s ease; border: none; width: 100%; display: block; text-align: center; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: #000; border: 2px solid #000; box-shadow: var(--brutal-shadow); }
        .btn-primary:hover { transform: translate(-2px, -2px); box-shadow: var(--brutal-shadow-hover); background: var(--primary-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.95rem; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 700; text-transform: uppercase; }
        .login-link a:hover { text-decoration: underline; }

        .error-msg { background: rgba(239,68,68,0.1); border: 2px solid #EF4444; color: #EF4444; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; }
        .success-msg { background: rgba(212,255,51,0.1); border: 2px solid var(--primary); color: var(--primary); padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">APPLY<span>/BOT</span></a></nav>

    <div class="container">
        <div class="header">
            <h1>Create Your Account</h1>
            <p>Your resume scored 90%+. You've earned 10 free automated applications.</p>
        </div>

        <div class="card">
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="signup-password" required placeholder="Minimum 8 characters" minlength="8">
                    <p class="password-hint">Must be at least 8 characters long</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm your password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" id="signup-btn">Create Account &rarr;</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ahpvdcdpwtdeoiatjvnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFocHZkY2Rwd3RkZW9pYXRqdm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzkzOTgsImV4cCI6MjA5MjM1NTM5OH0.CtrIL_U2y4Ffu8BBENNzloAkWBkvcq3WAhEeROH1LC0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });

                if (error) throw error;

                successMsg.textContent = 'Account created successfully! Redirecting to your dashboard...';
                successMsg.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (err) {
                errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        });
    </script>
</body>
</html>
