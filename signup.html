<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060913;
            --surface-color: rgba(18, 22, 38, 0.7);
            --primary: #4F46E5;
            --primary-glow: rgba(79, 70, 229, 0.5);
            --secondary: #10B981;
            --text-heading: #F9FAFB;
            --text-body: #9CA3AF;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-body); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

        .background-blob { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.6; }
        .blob-1 { background: linear-gradient(to right, #4F46E5, #8B5CF6); width: 500px; height: 500px; top: -150px; right: -100px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; border-bottom: 1px solid var(--border); background: rgba(6, 9, 19, 0.8); backdrop-filter: blur(10px); }
        .logo { color: var(--text-heading); font-size: 1.3rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo-dot { width: 10px; height: 10px; background: var(--secondary); border-radius: 50%; box-shadow: 0 0 15px var(--secondary); }

        .container { max-width: 500px; margin: 4rem auto; padding: 0 5%; flex: 1; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { color: white; font-size: 2.2rem; font-weight: 900; margin-bottom: 0.75rem; }
        .header p { color: var(--text-body); font-size: 1rem; }

        .card { background: var(--surface-color); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2.5rem; backdrop-filter: blur(20px); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #E5E7EB; font-weight: 500; font-size: 0.95rem; }
        input { width: 100%; padding: 1rem; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 0.5rem; color: white; font-size: 1rem; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: var(--primary); }
        .password-hint { font-size: 0.8rem; color: #6B7280; margin-top: 0.4rem; }

        .btn { padding: 1.1rem 2rem; border-radius: 0.75rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s ease; border: none; width: 100%; display: block; text-align: center; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 0 30px var(--primary-glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(79, 70, 229, 0.7); background: #4338ca; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: #6B7280; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.95rem; }
        .login-link a { color: var(--secondary); text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }

        .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
        .success-msg { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10B981; padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="background-blob blob-1"></div>

    <nav><a href="index.html" class="logo"><div class="logo-dot"></div>AutoApply AI</a></nav>

    <div class="container">
        <div class="header">
            <h1>Create Your Account</h1>
            <p>Your resume scored 90%+. You've earned 10 free automated applications.</p>
        </div>

        <div class="card">
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="signup-password" required placeholder="Minimum 8 characters" minlength="8">
                    <p class="password-hint">Must be at least 8 characters long</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm your password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" id="signup-btn">Create Account &rarr;</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ahpvdcdpwtdeoiatjvnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFocHZkY2Rwd3RkZW9pYXRqdm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzkzOTgsImV4cCI6MjA5MjM1NTM5OH0.CtrIL_U2y4Ffu8BBENNzloAkWBkvcq3WAhEeROH1LC0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });

                if (error) throw error;

                successMsg.textContent = 'Account created successfully! Redirecting to your dashboard...';
                successMsg.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (err) {
                errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        });
    </script>
</body>
</html>
