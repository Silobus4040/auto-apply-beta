<!DOCTYPE html>
<html lang="en">
<head>
    <script>if (window.location.hostname === 'jobs.leadscompass.ai') window.location.replace('https://myrolerover.com' + window.location.pathname + window.location.search);</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply AI | Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --surface-color: #ffffff;
            --primary: #00FFCC;
            --primary-hover: #00e6b8;
            --secondary: #FF6B4A;
            --text-heading: #000000;
            --text-body: #27272A;
            --border: #e4e4e7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-body); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }

        /* Soft background glows */
        body::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(212,255,51,0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -10%; right: -10%;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(0,255,204,0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid rgba(0,0,0,0.06); width: 100%; }
        .logo { color: var(--text-heading); font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; text-decoration: none; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; }
        .logo span { background: linear-gradient(135deg, #D4FF33, #00FFCC); color: #000000; padding: 0.2rem 0.6rem; margin-left: 0.35rem; font-size: 1.1rem; font-weight: 800; border-radius: 8px; display: inline-block; vertical-align: middle; box-shadow: 0 4px 10px rgba(212, 255, 51, 0.15); }

        .container { max-width: 450px; margin: 5rem auto; padding: 0 5%; flex: 1; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { color: var(--text-heading); font-size: 2.2rem; font-weight: 900; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: -1px; }
        .header p { color: #52525B; font-size: 1rem; font-weight: 500; }

        .card { background: var(--surface-color); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 24px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0, 255, 204, 0.04); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #52525B; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 1rem; background: #ffffff; border: 1px solid var(--border); border-radius: 12px; color: #000000; font-size: 1rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.15); }

        .btn { padding: 1.1rem 2rem; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-decoration: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; width: 100%; display: block; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Modern Liquid Motion Button */
        @keyframes liquid-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-primary { background: linear-gradient(135deg, #D4FF33, #00FFCC, #D4FF33); background-size: 200% auto; animation: liquid-gradient 3s linear infinite; color: #000000; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(212, 255, 51, 0.35); position: relative; }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(212, 255, 51, 0.55); }
        .btn-primary:active { transform: translateY(-1px) scale(0.99); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .signup-link { text-align: center; margin-top: 1.5rem; font-size: 0.95rem; font-weight: 500; }
        .signup-link a { color: #FF6B4A; text-decoration: none; font-weight: 700; text-transform: uppercase; }
        .signup-link a:hover { text-decoration: underline; }

        .error-msg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-transform: uppercase; border-radius: 12px; }
        @keyframes rover-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">ROLES <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1.1em" height="1.1em" style="display:inline-block; animation: rover-spin 4s linear infinite; margin: 0 6px; vertical-align: -0.15em;">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <polygon points="12,5 14.5,12 12,19 9.5,12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="12,5 14.5,12 12,12" fill="#ef4444"/>
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
</svg> <span>ROVER</span></a></nav>

    <div class="container">
        <div class="header">
            <h1>Welcome Back</h1>
            <p>Log in to your AutoApply dashboard</p>
        </div>

        <div class="card">
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg" style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;padding:0.75rem 1rem;border-radius:0.5rem;font-size:0.9rem;margin-bottom:1rem;display:none;"></div>

            <!-- Resend verification banner (hidden by default) -->
            <div id="unverified-banner" style="display:none;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.4);color:#F59E0B;padding:0.9rem 1rem;border-radius:0.5rem;font-size:0.9rem;margin-bottom:1rem;">
                <strong>⚠️ Email not verified.</strong> Check your inbox for the verification email, or
                <button onclick="resendVerification()" style="background:none;border:none;color:#F59E0B;font-weight:700;cursor:pointer;text-decoration:underline;font-size:0.9rem;">resend it now</button>.
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="john@example.com">
                </div>
                <div class="form-group" style="position:relative;">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                    <div style="text-align:right;margin-top:0.4rem;">
                        <button type="button" onclick="sendPasswordReset()" style="background:none;border:none;color:var(--secondary);font-size:0.85rem;font-weight:600;cursor:pointer;text-decoration:underline;">Forgot Password?</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">Log In &rarr;</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="index.html">Get Your Free Resume Score</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ahpvdcdpwtdeoiatjvnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFocHZkY2Rwd3RkZW9pYXRqdm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzkzOTgsImV4cCI6MjA5MjM1NTM5OH0.CtrIL_U2y4Ffu8BBENNzloAkWBkvcq3WAhEeROH1LC0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;

                // Check onboarding status — route accordingly
                const userId = data.user.id;
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('onboarding_complete')
                    .eq('id', userId)
                    .single();

                if (profile && profile.onboarding_complete) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'onboarding.html';
                }

            } catch (err) {
                const msg = err.message || '';
                // Detect unverified account
                if (msg.toLowerCase().includes('email not confirmed') || msg.toLowerCase().includes('not confirmed')) {
                    document.getElementById('unverified-banner').style.display = 'block';
                    errorMsg.style.display = 'none';
                } else {
                    errorMsg.textContent = msg || 'Invalid email or password.';
                    errorMsg.style.display = 'block';
                }
                btn.disabled = false;
                btn.textContent = 'Log In →';
            }
        });

        // ─── Resend verification email ───
        async function resendVerification() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) {
                alert('Please enter your email address first.');
                return;
            }
            const successMsg = document.getElementById('success-msg');
            const { error } = await supabaseClient.auth.resend({ type: 'signup', email });
            if (error) {
                alert('Could not resend: ' + error.message);
            } else {
                document.getElementById('unverified-banner').style.display = 'none';
                successMsg.textContent = '📧 Verification code sent! Check your inbox then come back to verify.';
                successMsg.style.display = 'block';
                sessionStorage.setItem('pending_verification_email', email);
                setTimeout(() => { window.location.href = 'verify.html'; }, 2500);
            }
        }

        // ─── Forgot Password → Resend Signup OTP (only confirmed working email type) ───
        async function sendPasswordReset() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) {
                alert('Please enter your email address first, then click Forgot Password.');
                return;
            }
            const successMsg = document.getElementById('success-msg');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Resend the signup OTP — same pipeline as account creation (confirmed working).
            // User enters the 8-digit code on verify.html to get logged in.
            const { error } = await supabaseClient.auth.resend({
                type: 'signup',
                email: email
            });

            if (error) {
                errorMsg.textContent = '❌ ' + (error.message || 'Could not send code. Please contact support.');
                errorMsg.style.display = 'block';
            } else {
                successMsg.textContent = '✅ Verification code sent to ' + email + '! Enter the 8-digit code to log in.';
                successMsg.style.display = 'block';
                // Store email and redirect to verify page
                sessionStorage.setItem('pending_verification_email', email);
                setTimeout(() => { window.location.href = 'verify.html'; }, 2000);
            }
        }
    </script>
</body>
</html>
