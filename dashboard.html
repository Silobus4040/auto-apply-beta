<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply AI | Job Queue</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060913;
            --surface-color: rgba(18, 22, 38, 0.7);
            --primary: #4F46E5;
            --primary-glow: rgba(79, 70, 229, 0.5);
            --secondary: #10B981;
            --text-heading: #F9FAFB;
            --text-body: #9CA3AF;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-body); line-height: 1.6; }
        
        .background-blob { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.6; }
        .blob-1 { background: linear-gradient(to right, #4F46E5, #8B5CF6); width: 600px; height: 600px; top: -200px; left: -100px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; border-bottom: 1px solid var(--border); background: rgba(6, 9, 19, 0.8); backdrop-filter: blur(10px); }
        .logo { color: var(--text-heading); font-size: 1.2rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo-dot { width: 10px; height: 10px; background: var(--secondary); border-radius: 50%; box-shadow: 0 0 15px var(--secondary); }

        .container { max-width: 1200px; margin: 3rem auto; padding: 0 5%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { color: white; font-size: 2rem; font-weight: 800; }
        .badge { background: rgba(79, 70, 229, 0.1); color: #A5B4FC; border: 1px solid rgba(79, 70, 229, 0.3); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.875rem; font-weight: 600; }

        .job-card { background: var(--surface-color); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 1rem; backdrop-filter: blur(20px); transition: transform 0.2s; }
        .job-card:hover { border-color: rgba(79, 70, 229, 0.5); }
        
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .company-info { display: flex; gap: 1rem; align-items: center; }
        .company-logo { width: 48px; height: 48px; border-radius: 0.5rem; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-size: 1.2rem; border: 1px solid var(--border); overflow: hidden; }
        .company-logo img { width: 100%; height: 100%; object-fit: cover; }
        .job-title { color: white; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
        .company-name { color: var(--secondary); font-weight: 600; font-size: 0.95rem; }

        .job-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; color: #D1D5DB; margin-top: 0.5rem; }
        .meta-item { display: flex; align-items: center; gap: 0.4rem; }
        .salary { color: #10B981; font-weight: 600; background: rgba(16,185,129,0.1); padding: 0.2rem 0.6rem; border-radius: 1rem; border: 1px solid rgba(16,185,129,0.2); }

        .job-desc-preview { font-size: 0.9rem; color: #9CA3AF; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .job-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; }
        .view-desc-btn { background: none; border: none; color: #A5B4FC; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
        .view-desc-btn:hover { color: white; }
        .status-pill { background: rgba(245, 158, 11, 0.1); color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.3); padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .desc-modal { background: #0f1628; border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; max-width: 700px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; }
        .desc-modal h2 { color: white; margin-bottom: 1rem; font-size: 1.5rem; }
        .desc-modal .full-text { color: #D1D5DB; font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; }
        .close-modal { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: #9CA3AF; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="background-blob blob-1"></div>

    <nav><a href="index.html" class="logo"><div class="logo-dot"></div>AutoApply AI</a></nav>

    <div class="container">
        <div class="header">
            <h1>Your Application Queue</h1>
            <div class="badge">10 / 10 Free Jobs Queued</div>
        </div>

        <div id="job-list">
            <!-- Jobs will be injected here via JS -->
        </div>
    </div>

    <!-- Description Modal -->
    <div class="modal-overlay" id="desc-modal">
        <div class="desc-modal">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2 id="modal-title">Job Description</h2>
            <div class="full-text" id="modal-text">Loading...</div>
        </div>
    </div>

    <script>
        // Simulated Apify Data (We can connect this to Supabase later)
        const mockJobs = [
            {
                companyName: "Stripe",
                companyLogo: "https://upload.wikimedia.org/wikipedia/commons/b/ba/Stripe_Logo%2C_revised_2016.svg",
                title: "Frontend Engineer, Remote",
                location: "United States (Remote)",
                postedAt: "4 hours ago",
                salary: "$140,000 - $190,000",
                applicantsCount: 842,
                descriptionText: "We are looking for an experienced Frontend Engineer to join our Remote team. You will be responsible for building highly performant UI components using React and TypeScript. \n\nRequirements:\n- 4+ years of React experience\n- Deep understanding of web performance\n- Experience with Next.js is a huge plus.\n\nStripe is an equal opportunity employer. We offer full remote flexibility, incredible health benefits, and a generous equity package."
            },
            {
                companyName: "Vercel",
                companyLogo: "",
                title: "Senior Product Designer",
                location: "Worldwide (Remote)",
                postedAt: "12 hours ago",
                salary: null,
                applicantsCount: 1204,
                descriptionText: "Vercel is seeking a Senior Product Designer to help shape the future of the web. You will work closely with engineering and product teams to design intuitive, beautiful interfaces for developers.\n\nRequirements:\n- Strong portfolio of B2B SaaS products\n- Expertise in Figma\n- Basic understanding of frontend code (HTML/CSS) is preferred."
            }
        ];

        function renderJobs() {
            const container = document.getElementById('job-list');
            let html = '';

            mockJobs.forEach((job, index) => {
                const logoHtml = job.companyLogo 
                    ? `<img src="${job.companyLogo}" alt="logo">` 
                    : job.companyName.charAt(0);

                const salaryHtml = job.salary 
                    ? `<span class="salary">💰 ${job.salary}</span>` 
                    : '';

                html += `
                    <div class="job-card">
                        <div class="job-header">
                            <div class="company-info">
                                <div class="company-logo">${logoHtml}</div>
                                <div>
                                    <div class="job-title">${job.title}</div>
                                    <div class="company-name">${job.companyName}</div>
                                </div>
                            </div>
                            <div class="status-pill">⏳ In Queue</div>
                        </div>
                        
                        <div class="job-meta">
                            <div class="meta-item">📍 ${job.location}</div>
                            <div class="meta-item">🕒 ${job.postedAt}</div>
                            <div class="meta-item">👥 ${job.applicantsCount} Applicants</div>
                            ${salaryHtml}
                        </div>

                        <div class="job-desc-preview">${job.descriptionText}</div>

                        <div class="job-actions">
                            <button class="view-desc-btn" onclick="openModal(${index})">
                                📄 Read Full Description
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function openModal(index) {
            const job = mockJobs[index];
            document.getElementById('modal-title').innerText = `${job.title} at ${job.companyName}`;
            document.getElementById('modal-text').innerText = job.descriptionText;
            document.getElementById('desc-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('desc-modal').classList.remove('active');
        }

        // Initialize
        renderJobs();
    </script>
</body>
</html>
