        .form-step { width: 50%; padding: 0 10px; flex-shrink: 0; }

        .card { background: var(--surface-color); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 24px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0, 255, 204, 0.04); margin-bottom: 1.5rem; }
        .card-title { color: #000000; font-size: 1.25rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }

        /* Modern Liquid Motion Button */
        @keyframes liquid-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-primary { background: linear-gradient(135deg, #D4FF33, #00FFCC, #D4FF33); background-size: 200% auto; animation: liquid-gradient 3s linear infinite; color: #000000; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(212, 255, 51, 0.35); position: relative; }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(212, 255, 51, 0.55); }
        
        .btn-secondary { background: #ffffff; color: #52525B; border: 1px solid var(--border); margin-bottom: 1rem; border-radius: 50px; }
        .btn-secondary:hover { color: #FF6B4A; border-color: #FF6B4A; }

        .error-msg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; padding: 0.75rem 1rem; font-weight: 700; font-size: 0.88rem; margin-bottom: 1.25rem; display: none; text-transform: uppercase; text-align: center; border-radius: 12px; }
        
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.92); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; backdrop-filter: blur(5px); }
        .loading-overlay.active { display: flex; }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: #FF6B4A; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #000000; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }

        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media(max-width: 600px) { .row-grid { grid-template-columns: 1fr; } }

<body>
    <nav><a href="index.html" class="logo">ROLES <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1.4em" height="1.4em" style="display:inline-block; margin: 0 6px; vertical-align: -0.2em;">

        <polygon points="50,22 58,50 50,50" fill="#ef4444"/>
        <polygon points="50,22 42,50 50,50" fill="#dc2626"/>
        <!-- South pointing grey needle -->
        <polygon points="50,78 58,50 50,50" fill="#94a3b8"/>
        <polygon points="50,78 42,50 50,50" fill="#64748b"/>

        });
        
        const checkboxes = document.querySelectorAll('#onboarding-form input[type="checkbox"]');
        checkboxes.forEach(cb => {
            const saved = localStorage.getItem('onb_cb_' + cb.value);
            if (saved) cb.checked = (saved === 'true');
            cb.addEventListener('change', () => localStorage.setItem('onb_cb_' + cb.value, cb.checked));
        });

        // Resume Step State
        if (localStorage.getItem('onb_step') === '2') {
            slider.style.transform = 'translateX(-50%)';
            stepIndicator.textContent = 'Step 2 of 2';
        }

        // Form Submit Logic
        document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const resumeUrl = localStorage.getItem('onb_resume_url');
            if (!resumeUrl) {
                errorMsg.textContent = "Resume not found. Please go back to Step 1 and upload your PDF.";
                errorMsg.style.display = 'block';
                slider.style.transform = 'translateX(0)';
                stepIndicator.textContent = 'Step 1 of 2';
                localStorage.setItem('onb_step', '1');
                return;
            }

            const phoneCode = document.getElementById('phone-code').value.trim();
            const phoneRaw = document.getElementById('phone').value.trim();
            
            if (!phoneCode || !/^\d+$/.test(phoneCode)) {
                errorMsg.textContent = "Country code is required and must contain ONLY numbers (e.g. 1, 44, 234). Do not include the '+' sign.";
                errorMsg.style.display = 'block';
                return;
            }

            const phone = phoneRaw ? `+${phoneCode} ${phoneRaw}` : '';
            const linkedin = document.getElementById('linkedin').value.trim();
            const portfolio = document.getElementById('portfolio').value.trim();
            const authWork = document.getElementById('auth-work').value;
            const sponsorship = document.getElementById('sponsorship').value;
            const salary = document.getElementById('salary').value.trim();
            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const country = document.getElementById('country').value.trim();

            if (!firstName || !city || !state || !country || !phoneRaw) {
                errorMsg.textContent = "Please fill out all mandatory fields: First Name, City, State, Country, and Phone Number.";
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('submit-btn');
            const loadingOverlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            
            btn.disabled = true;
            loadingOverlay.classList.add('active');

            try {
                // Update Profile with ALL data
                loadingText.textContent = "Saving Profile...";
                const { error: profileError } = await supabaseClient.from('profiles').upsert({
                    id: currentUserId,
                    target_job_titles: localStorage.getItem('onb_job-titles') || Array.from(document.querySelectorAll('.job-title-input')).map(i => i.value.trim()).filter(v => v).join(', '),
                    target_location: Array.from(document.getElementById('target-countries').selectedOptions).map(cb => cb.value).join(', '),
                    workplace_type: Array.from(document.querySelectorAll('input[name="workplace"]:checked')).map(cb => cb.value).join(', '),
                    first_name: firstName,
                    last_name: lastName,
                    city: city,
                    state: state,
                    country: country,
                    email: currentUserEmail,
                    phone: phone,
                    linkedin_url: linkedin,
                    website_url: portfolio,
                    work_authorization: authWork,
                    requires_sponsorship: sponsorship,
                    desired_salary: salary,
                    gender: document.getElementById('gender').value,
                    race: document.getElementById('race').value,
                    veteran_status: document.getElementById('veteran').value,
                    disability_status: document.getElementById('disability').value,
                    pronouns: document.getElementById('pronouns').value,
                    resume_url: resumeUrl,
                    scraper_status: 'scanning',
                    onboarding_complete: true,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' });

                if (profileError) throw profileError;

                // Clear cached data on success
                Object.keys(localStorage).forEach(key => { if (key.startsWith('onb_')) localStorage.removeItem(key); });

                // Set a flag to trigger the initial scrape on the dashboard
                localStorage.setItem('trigger_initial_scrape', 'true');

                loadingText.textContent = "Setup Complete!";
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

            } catch (err) {
                loadingOverlay.classList.remove('active');
                errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
            }
        });
    </script>
